<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Chat & Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b1120;
            --surface-color: #1e293b;
            --border-color: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bubble-bg: #2dd4bf;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--surface-color);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
            display: none;
        }

        .auth-container h2 {
            margin-bottom: 24px;
            font-weight: 600;
        }

        .input-text {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        .input-text:focus {
            border-color: var(--primary-color);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 15px;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface-color);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            display: none;
        }

        .header {
            padding: 16px 20px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout:hover {
            color: white;
            border-color: white;
        }

        .chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 80%;
            animation: slideUp 0.3s ease;
        }

        .message-inner {
            background: #273449;
            padding: 12px 16px;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            position: relative;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            width: 100%;
        }

        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 8px;
            display: block;
            cursor: pointer;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .message-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            text-align: right;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger-color);
            cursor: pointer;
            font-size: 12px;
            padding: 4px;
            opacity: 0.7;
            transition: 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }

        .input-area {
            padding: 16px;
            background: rgba(15, 23, 42, 0.8);
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .btn-icon {
            background: #334155;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-icon:hover {
            background: #475569;
        }

        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--primary-color);
        }

        .image-preview-container {
            display: none;
            padding: 10px 20px;
            background: var(--surface-color);
            border-top: 1px solid var(--border-color);
            position: relative;
        }

        .image-preview-container img {
            height: 60px;
            border-radius: 8px;
        }

        .remove-preview {
            position: absolute;
            left: 80px;
            top: 5px;
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 10px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">Uploading...</div>
    </div>

    <!-- Auth Screen -->
    <div class="auth-container" id="authScreen">
        <h2>Enter Secret Password</h2>
        <input type="password" id="passwordInput" class="input-text" placeholder="Password"
            onkeypress="if(event.key==='Enter') login()">
        <button class="btn-primary" onclick="login()">Enter Room</button>
        <p id="authError" style="color: var(--danger-color); margin-top: 10px; display: none;">Incorrect password.</p>
    </div>

    <!-- Chat Application -->
    <div class="app-container" id="appScreen">
        <div class="header">
            <h1>Private Gallery</h1>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="chat-area" id="chatArea">
            <!-- Messages will appear here -->
        </div>

        <div class="image-preview-container" id="imagePreviewContainer">
            <img id="imagePreview" src="" alt="Preview">
            <button class="remove-preview" onclick="clearImageSelection()">x</button>
        </div>

        <div class="input-area">
            <div class="file-upload-wrapper">
                <button class="btn-icon">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>
                <input type="file" id="imageInput" accept="image/*" onchange="handleImageSelection(event)">
            </div>

            <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..."
                onkeypress="if(event.key==='Enter') sendMessage()">

            <button class="btn-icon" style="background: var(--primary-color);" onclick="sendMessage()">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // Check Authentication on load
        async function checkAuth() {
            try {
                const res = await fetch('/api/check-auth');
                if (res.ok) {
                    showApp();
                } else {
                    showAuth();
                }
            } catch (err) {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('authScreen').style.display = 'block';
            document.getElementById('appScreen').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('appScreen').style.display = 'flex';
            fetchMessages();
        }

        async function login() {
            const password = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('authError');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                if (res.ok) {
                    errorMsg.style.display = 'none';
                    document.getElementById('passwordInput').value = '';
                    showApp();
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            showAuth();
        }

        // --- Chat Functions ---

        async function fetchMessages() {
            try {
                const res = await fetch('/api/messages');
                if (!res.ok) {
                    if (res.status === 401) logout();
                    return;
                }
                const messages = await res.json();
                renderMessages(messages);
            } catch (err) {
                console.error("Failed to load messages");
            }
        }

        function renderMessages(messages) {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = '';

            if (messages.length === 0) {
                chatArea.innerHTML = '<div style="text-align:center; color: #94a3b8; margin-top: 20px;">No messages yet. Send the first photo or message!</div>';
                return;
            }

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message';

                const timeStr = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                let innerHTML = `<div class="message-inner">`;

                if (msg.imageUrl) {
                    innerHTML += `<a href="${msg.imageUrl}" target="_blank"><img src="${msg.imageUrl}" /></a>`;
                }
                if (msg.content) {
                    innerHTML += `<div class="message-text">${escapeHTML(msg.content)}</div>`;
                }

                innerHTML += `
                    <div class="message-meta">
                        <span>${timeStr}</span>
                        <button class="delete-btn" onclick="deleteMessage('${msg.id}')">Delete</button>
                    </div>
                </div>`;

                div.innerHTML = innerHTML;
                chatArea.appendChild(div);
            });

            // Scroll to bottom
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function handleImageSelection(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreviewContainer').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        function clearImageSelection() {
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewContainer').style.display = 'none';
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        async function sendMessage() {
            const fileInput = document.getElementById('imageInput');
            const chatInput = document.getElementById('chatInput');

            const content = chatInput.value.trim();
            const file = fileInput.files[0];

            if (!content && !file) return;

            const formData = new FormData();
            formData.append('content', content);
            if (file) {
                formData.append('image', file);
            }

            showLoading(true);

            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    chatInput.value = '';
                    clearImageSelection();
                    fetchMessages();
                } else if (res.status === 401) {
                    logout();
                }
            } catch (err) {
                console.error("Error sending message");
            } finally {
                showLoading(false);
            }
        }

        async function deleteMessage(id) {
            if (!confirm("Delete this message completely?")) return;

            try {
                const res = await fetch(`/api/messages/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchMessages();
                }
            } catch (err) {
                console.error("Error deleting");
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag])
            );
        }

        // Run on start
        checkAuth();
    </script>
</body>

</html>
